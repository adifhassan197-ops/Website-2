<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Video Theme Clock</title>
    <style>
        /* CSS: ডিজাইন */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background 0.8s ease, color 0.5s ease;
        }

        /* ব্যাকগ্রাউন্ড ভিডিওর স্টাইল */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover;
            display: none;
        }
        
        .clock-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
        }
        
        h1 { 
            font-size: 3rem; 
            margin: 0 0 10px 0; 
            color: #f1c40f; 
            transition: all 0.5s ease;
        }
        #clock { font-size: 2.8rem; font-weight: bold; font-family: monospace; margin-bottom: 20px; }
        
        /* ড্রপডাউন মেনু */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background-color: #e74c3c;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
            transition: all 0.3s ease;
        }

        .dropbtn:hover { background-color: #c0392b; transform: translateY(-2px); }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
            border-radius: 8px;
            z-index: 2;
            margin-top: 5px;
            overflow: hidden;
            left: 50%;
            transform: translateX(-50%);
        }

        .dropdown-content button {
            color: #2c3e50;
            padding: 12px 16px;
            display: block;
            width: 100%;
            border: none;
            background: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .dropdown-content button:hover { background-color: #f1f2f6; }
        .show { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .theme-dark { background-color: #2c3e50; color: white; }
        .theme-purple { background-color: #6c5ce7; color: white; }
        .theme-sunset { background: linear-gradient(135deg, #ea2027, #ee5a24); color: white; }
        .theme-video { background: transparent; } 
    </style>
</head>
<body class="theme-dark">

    <video autoplay muted loop id="bg-video">
        <source src="video.mp4" type="video/mp4">
    </video>

    <div class="clock-container">
        <h1 id="main-heading">HELLO TANVIR</h1>
        <p>Choose a theme from the dropdown menu.</p>
        <div id="clock">00:00:00 PM</div>
        
        <div class="dropdown">
            <button onclick="toggleDropdown()" class="dropbtn">Change Theme ▾</button>
            <div id="myDropdown" class="dropdown-content">
                <button onclick="changeTheme('theme-video')">🎬 Video Theme</button>
                <button onclick="changeTheme('theme-dark')">🌌 Dark Blue</button>
                <button onclick="changeTheme('theme-purple')">🔮 Neon Purple</button>
                <button onclick="changeTheme('theme-sunset')">🌅 Sunset Glow</button>
            </div>
        </div>
    </div>

    <script>
        // ১. লাইভ ঘড়ি সচল রাখার কোড
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ২. ড্রপডাউন মেনু ওপেন/ক্লোজ করার ফাংশন
        function toggleDropdown() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // ৩. ভয়েস স্পিচ (Voice Speech) ফাংশন
        function speakText(textToSpeak) {
            window.speechSynthesis.cancel(); // আগের কথা বন্ধ করবে
            
            let speech = new SpeechSynthesisUtterance();
            speech.text = textToSpeak;
            speech.volume = 1; 
            speech.rate = 0.9;  // কথা বলার স্পিড
            speech.pitch = 1;  
            
            window.speechSynthesis.speak(speech);
        }

        // ৪. থিম পরিবর্তন এবং ভয়েস অন করার ফাংশন
        function changeTheme(themeName) {
            const video = document.getElementById("bg-video");
            
            document.body.className = '';
            document.body.classList.add(themeName);
            
            // ভিডিও কন্ট্রোল
            if (themeName === 'theme-video') {
                video.style.display = "block";
                video.play();
            } else {
                video.style.display = "none";
                video.pause();
            }
            
            // বাটন ক্লিক করলেই মুখে বলবে "Hello Tanvir"
            speakText("Hello Tanvir");
            
            document.getElementById("myDropdown").classList.remove("show");
        }

        // অন্য কোথাও ক্লিক করলে ড্রপডাউন বন্ধ হবে
        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
</body>
</html>
